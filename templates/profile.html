{% extends 'base.html' %}

{% block 'title' %}Profile | Droupadi Mess{% endblock 'title' %}

{% block 'content' %}

    <div class="entry-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-9">

                    <div class="text-center profile-img mb-3">
                        {% if profile %}
                            <img src="/uploads/{{profile.profile}}" alt="" class="mb-2">
                        {% else %}
                            <img src="/static/images/user.jpg" alt="" class="mb-2">
                        {% endif %}

                        {% comment %} <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <input type="file" name="pro-image" accept="image/png, image/gif, image/jpeg">
                            <button type="submit" class="btn btn-primary">Save</button>
                        </form> {% endcomment %}
                        <h6>{{ request.user.first_name }} {{ request.user.last_name }}</h6>
                    </div>

                    

                    <a href="{% url 'logout' %}" class="btn btn-primary w-100">Log out</a>
                </div>
            </div>
        </div>

        

        
    </div>

{% endblock 'content' %}
